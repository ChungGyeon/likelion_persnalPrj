<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카페 관리자 대시보드</title>
    <link rel="stylesheet" href="/cafe-app/admin/index.css">
</head>
<body>
<div class="dashboard-container">
    <!-- 사이드바 네비게이션 -->
    <aside class="sidebar">
        <div class="logo">Cafe Admin</div>
        <nav>
            <ul>
                <li><a href="index.html" class="active">대시보드 홈</a></li>
                <li><a href="orders/list.html">실시간 주문 목록</a></li>
                <li><a href="menus/list.html">메뉴 관리</a></li>
                <li><a href="menus/create.html">새 메뉴 추가</a></li>
            </ul>
        </nav>
    </aside>

    <!-- 메인 콘텐츠 영역 -->
    <main class="main-content">
        <header class="top-header">
            <h1>대시보드</h1>
            <div class="user-info">관리자님, 환영합니다</div>
        </header>

        <!-- 통계 요약 카드 -->
        <section class="stats-grid">
            <div class="stat-card">
                <h3>오늘의 주문</h3>
                <p class="stat-value">120건</p>
            </div>
            <div class="stat-card">
                <h3>오늘의 매출</h3>
                <p class="stat-value">₩540,000</p>
            </div>
            <div class="stat-card">
                <h3>활성 메뉴</h3>
                <p id="activeMenuCount" class="stat-value">0개</p>
            </div>
        </section>

        <!-- 하단 상세 섹션 (그리드 분할) -->
        <section class="content-sections">
            <!-- 퀵 액션 -->
            <div class="card">
                <h2>빠른 실행</h2>
                <div class="action-buttons">
                    <button class="action-btn" onclick="location.href='menus/create.html'">새 메뉴 추가하기</button>
                    <button class="action-btn outline">품절/숨김 처리하기</button>
                </div>
            </div>

            <!-- 메뉴 목록 테이블 -->
            <div class="card table-container">
                <h2>메뉴 현황</h2>
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>이미지</th>
                        <th>카테고리</th>
                        <th>메뉴명</th>
                        <th>가격</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                    </thead>
                    <tbody id="dashboardMenuTableBody">
                    <!-- JS를 통해 메뉴 데이터가 렌더링됩니다 -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
<script src="index.js"></script>
</body>
</html>
