<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메뉴 수정 - 카페 관리자</title>
    <link rel="stylesheet" href="./edit.css">
</head>
<body>
<div class="dashboard-container">
    <!-- 사이드바 -->
    <aside class="sidebar">
        <div class="logo">Cafe Admin</div>
        <nav>
            <ul>
                <li><a href="../../index.html">대시보드 홈</a></li>
                <li><a href="../orders/list.html">실시간 주문 목록</a></li>
                <li><a href="list.html" class="active">메뉴 관리 (목록)</a></li>
                <li><a href="create.html">새 메뉴 추가</a></li>
            </ul>
        </nav>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main class="main-content">
        <header class="top-header">
            <h1>메뉴 수정</h1>
            <div class="user-info">관리자님, 환영합니다</div>
        </header>

        <div class="card form-container">
            <h2>메뉴 정보 수정</h2>
            <form id="editMenuForm">

                <div class="form-group row">
                    <div class="input-field">
                        <label for="category">카테고리 <span class="required">*</span></label>
                        <select id="category" required>
                            <option value="">카테고리 선택</option>
                            <option value="커피">커피</option>
                            <option value="음료">음료</option>
                            <option value="디저트">디저트</option>
                            <option value="베이커리">베이커리</option>
                        </select>
                    </div>
                    <div class="input-field">
                        <label for="status">판매 상태 <span class="required">*</span></label>
                        <select id="status" required>
                            <option value="판매중">판매중</option>
                            <option value="품절">품절</option>
                            <option value="숨김">숨김</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="menuName">메뉴 이름 <span class="required">*</span></label>
                    <input type="text" id="menuName" required>
                </div>

                <div class="form-group">
                    <label for="price">기본 가격 (원) <span class="required">*</span></label>
                    <input type="number" id="price" required>
                </div>

                <div class="form-group">
                    <label>제공 옵션 (다중 선택)</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" name="options" value="HOT"> HOT 가능
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="options" value="ICE"> ICE 가능
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="options" value="SIZE_UP"> 사이즈업 가능 (+1000원)
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="options" value="SHOT"> 샷 추가 가능 (+500원)
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">메뉴 설명</label>
                    <textarea id="description" rows="3" placeholder="손님들에게 보여질 메뉴 설명을 적어주세요."></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="location.href='list.html'">취소</button>
                    <button type="submit" class="btn-submit">변경사항 저장</button>
                </div>
            </form>
        </div>
    </main>
</div>

<!-- JS 파일 연결 -->
<script src="./edit.js"></script>
</body>
</html>
