<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메뉴 관리 - 카페 관리자</title>
    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="./list.css">
</head>
<body>
<div class="dashboard-container">
    <!-- 사이드바 -->
    <aside class="sidebar">
        <div class="logo">Cafe Admin</div>
        <nav>
            <ul>
                <li><a href="../index.html">대시보드 홈</a></li>
                <li><a href="../orders/list.html">실시간 주문 목록</a></li>
                <li><a href="list.html" class="active">메뉴 관리 (목록)</a></li>
                <li><a href="create.html">새 메뉴 추가</a></li>
            </ul>
        </nav>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main class="main-content">
        <header class="top-header">
            <h1>메뉴 관리</h1>
            <div class="user-info">관리자님, 환영합니다</div>
        </header>

        <div class="card">
            <div class="list-header">
                <h2>전체 메뉴 목록</h2>
                <div class="list-actions">
                    <input type="text" id="searchInput" placeholder="메뉴명 검색..." class="search-input">
                    <button class="action-btn" onclick="location.href='create.html'">+ 새 메뉴 추가</button>
                </div>
            </div>

            <div class="table-container">
                <table class="data-table menu-table">
                    <thead>
                    <tr>
                        <th>이미지</th>
                        <th>카테고리</th>
                        <th>메뉴명</th>
                        <th>가격</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                    </thead>
                    <tbody id="menuTableBody">
                    <!-- JS를 통해 데이터가 렌더링 됩니다 -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<script src="./list.js"></script>
</body>
</html>
