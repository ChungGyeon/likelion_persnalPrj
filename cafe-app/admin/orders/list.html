<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 주문 목록 - 카페 관리자</title>
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="./list.css">
</head>
<body>
<div class="dashboard-container">
    <!-- 사이드바 -->
    <aside class="sidebar">
        <div class="logo">Cafe Admin</div>
        <nav>
            <ul>
                <li><a href="../index.html">대시보드 홈</a></li>
                <li><a href="./list.html" class="active">실시간 주문 목록</a></li>
                <li><a href="../menus/list.html">메뉴 관리</a></li>
            </ul>
        </nav>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main class="main-content">
        <header class="top-header">
            <h1>실시간 주문 목록</h1>
            <div class="user-info">관리자님, 환영합니다</div>
        </header>

        <div class="card">
            <div class="list-header">
                <h2>현재 주문 현황</h2>
            </div>

            <div class="table-container">
                <table class="data-table order-table">
                    <thead>
                    <tr>
                        <th>주문 번호</th>
                        <th>주문 시간</th>
                        <th>메뉴</th>
                        <th>총액</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                    </thead>
                    <tbody id="orderTableBody">
                    <!-- JS를 통해 데이터가 렌더링 됩니다 -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<script type="module" src="./list.js"></script>
</body>
</html>
