<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고객 장바구니 - 프리미엄 카페</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="list.css">
</head>
<body>
    <div class="background-mesh"></div>
    <div class="container">
        <header class="cart-header">
            <h1><i class="fa-solid fa-cart-shopping"></i> 장바구니</h1>
            <p class="subtitle">선택하신 맛있는 메뉴들을 확인하세요.</p>
        </header>
        
        <div class="cart-layout">
            <div class="cart-items-section">
                <ul id="basket-items" class="basket-list">
                    <!-- 장바구니 아이템이 여기에 동적으로 추가됩니다 -->
                </ul>
            </div>
            
            <div class="cart-summary-section">
                <div class="summary-card">
                    <h2>주문 요약</h2>
                    <div class="summary-row">
                        <span>상품 금액</span>
                        <span id="subtotal-price">0원</span>
                    </div>
                    <div class="summary-row">
                        <span>할인</span>
                        <span id="discount-price" class="highlight">-0원</span>
                    </div>
                    <hr class="summary-divider">
                    <div class="summary-row total">
                        <span>총 결제 금액</span>
                        <span id="total-price">0원</span>
                    </div>
                    <button class="checkout-btn">
                        <span>결제하기</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="list.js"></script>
</body>
</html>
